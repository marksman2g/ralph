<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frequency of Life GIF Preview</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      align-items: center;
      background: #ffffff;
      display: grid;
      margin: 0;
      min-height: 100svh;
      padding: clamp(16px, 4vw, 48px);
    }

    main {
      width: min(100%, 960px);
    }

    img {
      background: #ffffff;
      border: 1px solid rgba(5, 7, 10, 0.08);
      border-radius: 8px;
      box-shadow: 0 20px 54px rgba(5, 7, 10, 0.14);
      display: block;
      height: auto;
      width: 100%;
    }
  </style>
</head>
<body>
  <main aria-label="Frequency of Life animated GIF preview">
    <img src="frequency-logo-preview.gif" alt="Frequency of Life animated logo">
  </main>
</body>
</html>
