<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 360" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">Frequency of Life animated logo</title>
  <desc id="logo-desc">Frequency of Life wordmark with blue ECG wire, blue-white electric plasma, and a black quarter-inch jack.</desc>
  <defs>
    <style>
      :root {
        --ink: #05070a;
        --blue: #123dff;
        --cyan: #22dfff;
        --white: #ffffff;
      }

      .ecg-base,
      .right-cable {
        filter: url(#lineGlow);
        stroke: var(--blue);
      }

      .ecg-current,
      .right-current {
        animation: currentRush 920ms linear infinite;
        filter: url(#whiteBlueGlow);
        stroke: url(#flowGradient);
        stroke-dasharray: 58 220 16 155;
        stroke-dashoffset: 0;
      }

      .word-base {
        fill: var(--ink);
        font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
        font-size: 96px;
        font-weight: 900;
        letter-spacing: 0;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .word-blue {
        animation: wordJitter 760ms steps(2, end) infinite;
        fill: none;
        filter: drop-shadow(0 0 6px rgba(34, 223, 255, 0.8));
        font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
        font-size: 96px;
        font-weight: 900;
        letter-spacing: 0;
        opacity: 0.52;
        stroke: #0a63ff;
        stroke-width: 2.6;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .clip-word {
        font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
        font-size: 96px;
        font-weight: 900;
        letter-spacing: 0;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .scan-block {
        animation: scanWord 2700ms linear infinite;
        filter: url(#whiteBlueGlow);
        opacity: 0.95;
      }

      .glitch-strip {
        animation: glitchSweep 1250ms steps(3, end) infinite;
        opacity: 0;
      }

      .strip-two { animation-delay: 160ms; }
      .strip-three { animation-delay: 310ms; }
      .strip-four { animation-delay: 470ms; }

      .bolt,
      .mini-spark {
        filter: url(#whiteBlueGlow);
      }

      .mini-spark {
        animation: sparkBlink 520ms steps(2, end) infinite;
      }

      .plasma-motion {
        filter: url(#plasmaGlow);
      }

      .static-trail {
        filter: url(#whiteBlueGlow);
        opacity: 0.78;
      }

      .trail-bolt {
        animation: trailFlicker 360ms steps(2, end) infinite;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .trail-dot {
        animation: trailFlicker 420ms steps(2, end) infinite;
      }

      .plasma-core {
        transform-box: fill-box;
        transform-origin: center;
      }

      .plasma-bolt {
        animation: lightningFlicker 260ms steps(2, end) infinite;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .quarter-jack {
        animation: jackHit 1600ms ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }

      @keyframes currentRush {
        100% { stroke-dashoffset: -455; }
      }

      @keyframes wordJitter {
        0%, 100% { opacity: 0.3; transform: translate(0, 0); }
        18% { opacity: 0.62; transform: translate(4px, -1px); }
        40% { opacity: 0.2; transform: translate(-5px, 1px); }
        64% { opacity: 0.7; transform: translate(2px, 0); }
        82% { opacity: 0.38; transform: translate(-2px, -1px); }
      }

      @keyframes scanWord {
        0% { transform: translateX(-760px); opacity: 0; }
        8% { opacity: 1; }
        78% { opacity: 1; }
        100% { transform: translateX(760px); opacity: 0; }
      }

      @keyframes glitchSweep {
        0%, 100% { opacity: 0; transform: translateX(-280px); }
        18% { opacity: 0.95; transform: translateX(-120px); }
        32% { opacity: 0.45; transform: translateX(38px); }
        50% { opacity: 0.85; transform: translateX(230px); }
        70% { opacity: 0; transform: translateX(390px); }
      }

      @keyframes sparkBlink {
        0%, 100% { opacity: 0.1; transform: scale(0.72); }
        45% { opacity: 1; transform: scale(1.12); }
      }

      @keyframes trailFlicker {
        0%, 100% { opacity: 0.16; transform: scale(0.74) rotate(-8deg); }
        48% { opacity: 1; transform: scale(1.12) rotate(8deg); }
      }

      @keyframes lightningFlicker {
        0%, 100% { opacity: 0.35; stroke-width: 3; }
        50% { opacity: 1; stroke-width: 5; }
      }

      @keyframes jackHit {
        0%, 100% { filter: drop-shadow(0 0 2px rgba(5, 7, 10, 0.25)); }
        38% { filter: drop-shadow(0 0 12px rgba(34, 223, 255, 0.85)); }
        56% { filter: drop-shadow(0 0 4px rgba(5, 7, 10, 0.35)); }
      }
    </style>

    <linearGradient id="flowGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#123dff"/>
      <stop offset="0.42" stop-color="#22dfff"/>
      <stop offset="0.54" stop-color="#ffffff"/>
      <stop offset="0.66" stop-color="#22dfff"/>
      <stop offset="1" stop-color="#123dff"/>
    </linearGradient>

    <linearGradient id="scanGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#123dff" stop-opacity="0"/>
      <stop offset="0.24" stop-color="#123dff" stop-opacity="0.55"/>
      <stop offset="0.48" stop-color="#ffffff"/>
      <stop offset="0.72" stop-color="#22dfff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#123dff" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="plasmaGradient" cx="50%" cy="45%" r="58%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.16" stop-color="#d9fbff"/>
      <stop offset="0.42" stop-color="#22dfff"/>
      <stop offset="0.72" stop-color="#0a57ff"/>
      <stop offset="1" stop-color="#071b62" stop-opacity="0.9"/>
    </radialGradient>

    <filter id="lineGlow" x="-20%" y="-150%" width="140%" height="400%">
      <feGaussianBlur stdDeviation="3" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="whiteBlueGlow" x="-70%" y="-180%" width="240%" height="460%">
      <feGaussianBlur stdDeviation="5" result="glow"/>
      <feColorMatrix in="glow" type="matrix" values="0 0 0 0 0.05 0 0 0 0 0.55 0 0 0 0 1 0 0 0 0.95 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="plasmaGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="9" result="glow"/>
      <feColorMatrix in="glow" type="matrix" values="0 0 0 0 0.04 0 0 0 0 0.58 0 0 0 0 1 0 0 0 0.9 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="wordClip">
      <text class="clip-word" x="750" y="180">FREQUENCY OF LIFE</text>
    </clipPath>
  </defs>

  <rect width="1500" height="360" fill="#fbfdff"/>
  <path d="M0 178 H90 L106 178 L124 142 L145 218 L170 54 L204 306 L235 140 L258 178 H366" fill="none" stroke="#123dff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" class="ecg-base"/>
  <path d="M0 178 H90 L106 178 L124 142 L145 218 L170 54 L204 306 L235 140 L258 178 H366" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" class="ecg-current"/>

  <g class="mini-spark" transform="translate(126 144)">
    <path d="M0 26 L15 -8 L11 15 L37 2 L14 43 L19 24 Z" fill="#ffffff"/>
    <path d="M3 24 L16 -4 L13 14 L32 4 L15 36 Z" fill="#22dfff"/>
  </g>

  <g>
    <text class="word-blue" x="750" y="180">FREQUENCY OF LIFE</text>
    <text class="word-base" x="750" y="180">FREQUENCY OF LIFE</text>
    <g clip-path="url(#wordClip)">
      <rect class="scan-block" x="590" y="106" width="340" height="148" fill="url(#scanGradient)"/>
      <rect class="glitch-strip" x="445" y="128" width="610" height="12" fill="#22dfff"/>
      <rect class="glitch-strip strip-two" x="420" y="157" width="700" height="10" fill="#ffffff"/>
      <rect class="glitch-strip strip-three" x="468" y="186" width="640" height="14" fill="#0a63ff"/>
      <rect class="glitch-strip strip-four" x="430" y="215" width="680" height="9" fill="#22dfff"/>
    </g>
  </g>

  <path d="M1068 178 H1464" fill="none" stroke="#123dff" stroke-width="9" stroke-linecap="round" class="right-cable"/>
  <path d="M1068 178 H1464" fill="none" stroke-width="6" stroke-linecap="round" class="right-current"/>

  <g transform="translate(1188 98)">
    <path class="right-cable" d="M0 80 H62" fill="none" stroke-width="10" stroke-linecap="round"/>
    <g class="quarter-jack" aria-label="black quarter-inch audio jack">
      <path d="M52 80 H84" fill="none" stroke="#05070a" stroke-width="22" stroke-linecap="round"/>
      <path d="M68 56 H128 C142 56 154 67 154 80 C154 93 142 104 128 104 H68 C58 104 50 96 50 86 V74 C50 64 58 56 68 56 Z" fill="#05070a"/>
      <path d="M74 64 H124" stroke="#2a2f38" stroke-width="7" stroke-linecap="round" opacity="0.74"/>
      <path d="M84 59 V101 M102 59 V101 M120 61 V99" stroke="#151922" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
      <rect x="146" y="63" width="16" height="34" rx="7" fill="#11151b"/>
      <path d="M158 68 H182 C188 68 192 73 192 80 C192 87 188 92 182 92 H158 Z" fill="#05070a"/>
      <rect x="188" y="70" width="55" height="20" rx="10" fill="#11151b"/>
      <rect x="206" y="66" width="9" height="28" rx="4.5" fill="#05070a"/>
      <rect x="238" y="66" width="9" height="28" rx="4.5" fill="#05070a"/>
      <path d="M243 71 H258 C266 71 272 75 276 80 C272 85 266 89 258 89 H243 Z" fill="#11151b"/>
      <path d="M190 73 H204 M218 73 H236 M248 73 H258" stroke="#343a44" stroke-width="3" stroke-linecap="round" opacity="0.66"/>
      <path d="M190 87 H204 M218 87 H236 M248 87 H257" stroke="#05070a" stroke-width="3" stroke-linecap="round" opacity="0.86"/>
    </g>
  </g>

  <g class="bolt">
    <path d="M0 0 L15 -32 L11 -7 L38 -19 L13 22 L18 0 Z" fill="#ffffff">
      <animateMotion dur="1.45s" repeatCount="indefinite" rotate="auto" path="M0 178 H90 L106 178 L124 142 L145 218 L170 54 L204 306 L235 140 L258 178 H366"/>
    </path>
    <circle r="5" fill="#22dfff">
      <animateMotion dur="1.45s" begin="0.4s" repeatCount="indefinite" path="M0 178 H90 L106 178 L124 142 L145 218 L170 54 L204 306 L235 140 L258 178 H366"/>
    </circle>
    <path d="M0 0 L14 -25 L10 -5 L32 -14 L13 16 L17 0 Z" fill="#ffffff">
      <animateMotion dur="1.2s" begin="0.22s" repeatCount="indefinite" rotate="auto" path="M1068 178 H1464"/>
    </path>
    <circle r="4.2" fill="#22dfff">
      <animateMotion dur="1.2s" begin="0.62s" repeatCount="indefinite" path="M1068 178 H1464"/>
    </circle>
  </g>

  <g class="plasma-motion">
    <animateMotion begin="0s" dur="3.2s" repeatCount="indefinite" path="M315 178 C460 96 570 246 718 178 C874 105 1018 250 1280 178"/>
    <g class="plasma-core">
      <animateTransform attributeName="transform" type="scale" begin="0s" dur="3.2s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.07;0.62;0.78;0.88;0.95;1" values="0.72;0.92;1.02;1.18;1.72;2.35;0.72"/>
      <animate attributeName="opacity" begin="0s" dur="3.2s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.07;0.62;0.78;0.88;0.95;1" values="0;0.94;1;1;1;0.9;0"/>
      <circle r="58" fill="#0a57ff" opacity="0.12"/>
      <circle r="46" fill="url(#plasmaGradient)" opacity="0.95"/>
      <circle r="26" fill="#ffffff" opacity="0.45"/>
      <circle r="62" fill="none" stroke="#22dfff" stroke-width="3" opacity="0.8"/>
      <path class="plasma-bolt" d="M-50 -2 C-35 -25 -20 18 -6 -8 S24 -26 50 0" stroke="#ffffff"/>
      <path class="plasma-bolt" d="M-42 24 C-18 8 -12 48 8 20 S36 6 54 28" stroke="#22dfff"/>
      <path class="plasma-bolt" d="M-16 -50 C-8 -26 18 -24 8 -2 S20 34 4 52" stroke="#ffffff"/>
      <path class="plasma-bolt" d="M-56 -30 L-28 -18 L-48 -6 M54 -34 L26 -20 L50 -4 M-42 42 L-18 25 L-28 55" stroke="#d9fbff" stroke-width="3"/>
    </g>
  </g>

  <g class="static-trail">
    <g>
      <animateMotion dur="3.2s" begin="0.10s" repeatCount="indefinite" path="M315 178 C460 96 570 246 718 178 C874 105 1018 250 1280 178"/>
      <path class="trail-bolt" d="M-42 8 L-24 -14 L-28 4 L-6 -10 L-22 24 L-16 6 Z" stroke="#ffffff" stroke-width="4"/>
      <circle class="trail-dot" cx="-54" cy="-12" r="5" fill="#22dfff"/>
      <circle class="trail-dot" cx="-72" cy="16" r="3.4" fill="#ffffff"/>
    </g>
    <g>
      <animateMotion dur="3.2s" begin="0.20s" repeatCount="indefinite" path="M315 178 C460 96 570 246 718 178 C874 105 1018 250 1280 178"/>
      <path class="trail-bolt" d="M-76 -18 L-52 -34 L-60 -10 L-34 -24 L-58 10 L-49 -8" stroke="#22dfff" stroke-width="3.6"/>
      <circle class="trail-dot" cx="-90" cy="10" r="4.2" fill="#d9fbff"/>
      <circle class="trail-dot" cx="-112" cy="-16" r="2.8" fill="#22dfff"/>
    </g>
    <g>
      <animateMotion dur="3.2s" begin="0.31s" repeatCount="indefinite" path="M315 178 C460 96 570 246 718 178 C874 105 1018 250 1280 178"/>
      <path class="trail-bolt" d="M-112 18 L-92 -7 L-98 12 L-76 -2 L-96 34 L-88 14" stroke="#ffffff" stroke-width="3.2"/>
      <circle class="trail-dot" cx="-128" cy="-4" r="3.2" fill="#ffffff"/>
      <circle class="trail-dot" cx="-146" cy="22" r="2.8" fill="#22dfff"/>
    </g>
  </g>

</svg>
